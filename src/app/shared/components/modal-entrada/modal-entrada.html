<div class="modal-backdrop" (click)="fechar.emit()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div>
        <h2>Registrar Entrada na Vaga</h2>
        <p>Informe o número da vaga e os dados do veículo</p>
      </div>
      <button class="btn-close" (click)="fechar.emit()">×</button>
    </div>

    <div class="modal-body">

      <div class="form-field">
        <label>Número da Vaga <span class="required">*</span></label>
        <input
          type="number"
          [(ngModel)]="dados.vaga"
          placeholder="Ex: 42"
          min="1"
        />
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Placa <span class="required">*</span></label>
          <input
            type="text"
            [(ngModel)]="dados.placa"
            placeholder="ABC-1234"
            maxlength="8"
          />
        </div>

        <div class="form-field">
          <label>Tipo</label>
          <select [(ngModel)]="dados.tipo">
            <option value="Carro">Carro</option>
            <option value="Moto">Moto</option>
            <option value="Van">Van</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label>Modelo / Marca <span class="required">*</span></label>
        <input
          type="text"
          [(ngModel)]="dados.modelo"
          placeholder="Ex: Honda Civic, Yamaha Factor..."
        />
      </div>

      <div class="toggle-field">
        <div class="toggle-info">
          <span class="toggle-label">Cliente Mensalista?</span>
          <span class="toggle-sub">Aplicar tarifa especial de mensalidade</span>
        </div>
        <button
          class="toggle-btn"
          [class.on]="dados.mensalista"
          (click)="dados.mensalista = !dados.mensalista"
          type="button"
        >
          <span class="toggle-thumb"></span>
        </button>
      </div>

      <div *ngIf="erro" class="error-msg">{{ erro }}</div>

    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="fechar.emit()">Cancelar</button>
      <button class="btn-confirm" (click)="confirmar()">Confirmar Entrada</button>
    </div>

  </div>
</div>
